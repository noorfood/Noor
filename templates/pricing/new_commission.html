{% extends 'base.html' %}
{% block title %}Set Commission — Noor Foods{% endblock %}

{% block content %}
<style>
    .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        padding: 2.5rem;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        max-width: 800px;
        margin: 2rem auto;
    }
    .form-header { margin-bottom: 2rem; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 1rem; }
    .form-title { font-size: 1.5rem; font-weight: 900; color: #0f172a; margin: 0; }
    .form-subtitle { font-size: 0.85rem; color: #64748b; margin-top: 0.5rem; }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: #475569; margin-bottom: 0.5rem; }
    .form-input {
        width: 100%; padding: 0.75rem 1rem; border-radius: 12px; border: 1px solid #e2e8f0;
        background: rgba(255,255,255,0.8); font-size: 0.95rem; font-weight: 600; color: #1e293b;
        transition: all 0.2s;
    }
    .form-input:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); background: #fff; }
    
    .btn-submit {
        background: #8b5cf6; color: #fff; border: none; padding: 12px 32px; border-radius: 12px;
        font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem;
        cursor: pointer; transition: all 0.2s;
    }
    .btn-submit:hover { background: #7c3aed; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2); }
</style>

<div class="glass-card">
    <div class="form-header">
        <h2 class="form-title">💸 Set Sales Team Commission</h2>
        <p class="form-subtitle">Define the unified incentive percentage for all sales team members.</p>
    </div>

    {% if error %}
    <div style="background: #fef2f2; border-left: 4px solid #ef4444; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; color: #991b1b; font-size: 0.85rem; font-weight: 600;">
        ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Target Channel</label>
                <select name="channel" class="form-input" required>
                    <option value="">— Select Channel —</option>
                    {% for val, label in channel_choices %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Material Category</label>
                <select name="material_type" class="form-input" required>
                    <option value="">— Select Material —</option>
                    {% for val, label in material_choices %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Commission Percentage (%)</label>
                <input type="number" name="commission_pct" min="0" max="100" step="0.01" class="form-input" placeholder="e.g. 10.0" required>
            </div>
            <div class="form-group">
                <label class="form-label">Effective Date</label>
                <input type="date" name="effective_from" value="{{ today }}" class="form-input" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Additional Context (Optional)</label>
            <textarea name="notes" class="form-input" rows="3" placeholder="Notes for auditors..."></textarea>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn-submit">💾 Save Commission Rule</button>
            <a href="{% url 'pricing:commissions' %}" style="display: flex; align-items: center; text-decoration: none; color: #64748b; font-weight: 700; font-size: 0.85rem;">Cancel & Return</a>
        </div>
    </form>
</div>
{% endblock %}
